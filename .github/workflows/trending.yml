name: Fetch GitHub Trending

on:
  schedule:
    - cron: '0 0 * * *' # 每天自动运行
  workflow_dispatch: # 允许手动运行

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch Top Repos and Update README
        run: |
          python -c '
          import urllib.request
          import json
          import datetime

          # 获取全网最近一周最火的前10个项目（不限语言）
          date_limit = (datetime.date.today() - datetime.timedelta(days=7)).isoformat()
          url = f"https://api.github.com/search/repositories?q=created:>{date_limit}&sort=stars&order=desc&per_page=10"
          
          req = urllib.request.Request(url, headers={"User-Agent": "Python-urllib"})
          with urllib.request.urlopen(req) as response:
              data = json.loads(response.read().decode())

          trending_text = "\n### 📈 Weekly Global Top 10 Repositories\n"
          for repo in data.get("items", []):
              name = repo["full_name"]
              html_url = repo["html_url"]
              desc = repo["description"] or "No description."
              stars = repo["stargazers_count"]
              lang = repo["language"] or "Unknown"
              trending_text += f"- **[{name}]({html_url})** (`{lang}`) - ⭐ {stars}\n  *{desc.strip()}*\n"

          # 读取并重写 README
          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          start_marker = "<!-- TRENDING-REGIONS:START -->"
          end_marker = "<!-- TRENDING-REGIONS:END -->"

          if start_marker in content and end_marker in content:
              parts = content.split(start_marker)
              before = parts[0] + start_marker
              after = end_marker + parts[1].split(end_marker)[1]
              new_content = before + "\n" + trending_text + "\n" + after
              
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(new_content)
              print("README updated successfully with Global Top 10 repos.")
          else:
              print("Markers not found in README.md")
          '

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update daily global top 10 github trending" || exit 0
          git push
